name: "Bug Report"
description: "Something is broken or behaving unexpectedly"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please fill in as much detail as you can so we can reproduce and fix the issue.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Where is this happening? (e.g. Production, Staging, Dev, specific browser/device)"
      placeholder: "e.g. Production - Chrome 120 on Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the bug clearly. What did you see?"
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: "Describe the correct/expected behaviour"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Walk us through how to trigger this"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Critical - System down / data loss"
        - "High - Major feature broken, no workaround"
        - "Medium - Feature broken but workaround exists"
        - "Low - Minor annoyance / cosmetic"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Error Messages
      description: "Paste any relevant logs, stack traces, or attach screenshots"
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Anything else that might help (recent changes, frequency, affected users, etc.)"
