name: "Bug Report"
description: "Something's broken"
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      default: 2
      options:
        - "Critical - down / data loss"
        - "High - broken, no workaround"
        - "Medium - broken, workaround exists"
        - "Low - cosmetic / annoyance"

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce

  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots / context
      render: shell
