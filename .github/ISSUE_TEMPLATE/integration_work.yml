name: "Integration Work"
description: "Connect systems, platforms, or devices"
labels: ["integration", "triage"]
body:
  - type: input
    id: source
    attributes:
      label: Source system
      placeholder: "e.g. Xero, CRM, IoT device"
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Target system
      placeholder: "e.g. Internal CRM, accounting platform"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: What should it do?

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated complexity
      default: 3
      options:
        - "Simple - known APIs, straightforward"
        - "Medium - some unknowns"
        - "Complex - multiple systems, custom logic"
        - "Unknown - needs investigation"
