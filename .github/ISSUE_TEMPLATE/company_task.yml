name: "Company Task"
description: "Admin/ops task not tied to a job or project"
labels: ["company-task", "operations"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      default: 6
      options:
        - "Finance / Banking"
        - "Email / Comms"
        - "Subscriptions / Licensing"
        - "Legal / Compliance"
        - "HR / People"
        - "Infrastructure / Office"
        - "Other"

  - type: textarea
    id: description
    attributes:
      label: What needs doing?
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Who's on it?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      default: 1
      options:
        - "Low - when we get to it"
        - "Medium - soon"
        - "High - blocking or time-sensitive"
