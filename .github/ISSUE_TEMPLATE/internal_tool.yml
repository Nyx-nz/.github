name: "Internal Tool / Portal"
description: "Automate or improve an internal process"
labels: ["internal-tooling", "triage"]
body:
  - type: textarea
    id: current
    attributes:
      label: How is this done now?
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: How should it work?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      default: 1
      options:
        - "Low - nice to have"
        - "Medium - causing friction"
        - "High - wasting serious time"
        - "Critical - process is failing"
