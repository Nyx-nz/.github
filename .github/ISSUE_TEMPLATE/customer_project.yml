name: "Customer Project"
description: "New customer work needing scoping"
labels: ["customer-project", "needs-scoping"]
body:
  - type: input
    id: customer
    attributes:
      label: Customer
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What do they want?
    validations:
      required: true

  - type: textarea
    id: unknowns
    attributes:
      label: What don't we know yet?

  - type: dropdown
    id: size
    attributes:
      label: Estimated size
      default: 3
      options:
        - "Days"
        - "Weeks"
        - "Months"
        - "No idea yet"

  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: "e.g. End of Q2, ASAP, none"
